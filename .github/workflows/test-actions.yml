name: Test Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-stash-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create fake Go bench output
        run: |
          mkdir -p results
          cat > results/bench.txt << 'EOF'
          BenchmarkSort-4           5000000       320 ns/op      48 B/op       2 allocs/op
          BenchmarkSearch-4        10000000       120 ns/op       0 B/op       0 allocs/op
          BenchmarkInsert-4         3000000       450 ns/op      64 B/op       3 allocs/op
          EOF

      - name: Stash Go bench results
        uses: ./actions/stash
        id: stash
        with:
          results: results/bench.txt
          format: go
          run-id: test-go-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Verify stash outputs
        run: |
          echo "Run ID: ${{ steps.stash.outputs.run-id }}"
          echo "File:   ${{ steps.stash.outputs.file-path }}"
          [[ -n "${{ steps.stash.outputs.run-id }}" ]] || exit 1

  test-stash-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create native format results
        run: |
          cat > results.json << 'EOF'
          {
            "benchmarks": [
              {
                "name": "http-throughput",
                "metrics": {
                  "requests_per_sec": { "value": 15230, "unit": "req/s", "direction": "bigger_is_better" },
                  "p99_latency_ms": { "value": 12.4, "unit": "ms", "direction": "smaller_is_better" }
                }
              }
            ]
          }
          EOF

      - name: Stash native results
        uses: ./actions/stash
        id: stash
        with:
          results: results.json
          format: native
          run-id: test-native-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Verify stash outputs
        run: |
          echo "Run ID: ${{ steps.stash.outputs.run-id }}"
          [[ -n "${{ steps.stash.outputs.run-id }}" ]] || exit 1

  test-stash-go-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Go bench output with -count=3 (duplicate benchmarks)
        run: |
          mkdir -p results
          cat > results/bench.txt << 'EOF'
          BenchmarkSort-4           5000000       300 ns/op      48 B/op       2 allocs/op
          BenchmarkSort-4           5000000       320 ns/op      48 B/op       2 allocs/op
          BenchmarkSort-4           5000000       310 ns/op      48 B/op       2 allocs/op
          BenchmarkSearch-4        10000000       100 ns/op       0 B/op       0 allocs/op
          BenchmarkSearch-4        10000000       120 ns/op       0 B/op       0 allocs/op
          BenchmarkSearch-4        10000000       110 ns/op       0 B/op       0 allocs/op
          EOF

      - name: Stash Go count=3 results
        uses: ./actions/stash
        id: stash
        with:
          results: results/bench.txt
          format: go
          run-id: test-count-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Verify stash outputs
        run: |
          echo "Run ID: ${{ steps.stash.outputs.run-id }}"
          [[ -n "${{ steps.stash.outputs.run-id }}" ]] || exit 1

          # Verify the stashed file has all 6 benchmark entries (not averaged yet)
          git fetch origin bench-data
          content=$(git show origin/bench-data:data/runs/${{ steps.stash.outputs.run-id }}.json)
          count=$(echo "$content" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['benchmarks']))")
          echo "Benchmark entries in run file: $count"
          [[ "$count" -eq 6 ]] || { echo "Expected 6 benchmark entries, got $count"; exit 1; }

  test-aggregate:
    needs: [test-stash-go, test-stash-native, test-stash-go-count]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aggregate results
        uses: ./actions/aggregate
        id: agg

      - name: Verify aggregate outputs
        run: |
          echo "Run count: ${{ steps.agg.outputs.run-count }}"
          echo "Metrics:   ${{ steps.agg.outputs.metrics }}"
          [[ "${{ steps.agg.outputs.run-count }}" -ge 3 ]] || exit 1

      - name: Verify data branch contents
        run: |
          git fetch origin bench-data
          git show origin/bench-data:data/index.json | head -20
          echo "---"
          ls_output=$(git ls-tree --name-only origin/bench-data data/series/)
          echo "Series files: $ls_output"
          [[ -n "$ls_output" ]] || exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate schemas on data branch
        run: |
          npm install ajv ajv-formats ajv-cli
          git fetch origin bench-data

          # Extract and validate index.json
          git show origin/bench-data:data/index.json > /tmp/index.json
          echo "=== index.json ==="
          cat /tmp/index.json
          npx ajv validate -s schema/index.schema.json -d /tmp/index.json --spec=draft2020 -c ajv-formats || exit 1
          echo "✓ index.json conforms to schema"

          # Validate each series file
          for file in $(git ls-tree --name-only origin/bench-data data/series/); do
            git show "origin/bench-data:$file" > "/tmp/series-$(basename $file)"
            echo "=== $file ==="
            cat "/tmp/series-$(basename $file)"
            npx ajv validate -s schema/series.schema.json -d "/tmp/series-$(basename $file)" --spec=draft2020 -c ajv-formats || exit 1
            echo "✓ $file conforms to schema"
          done

          # Validate each run file
          for file in $(git ls-tree --name-only origin/bench-data data/runs/); do
            git show "origin/bench-data:$file" > "/tmp/run-$(basename $file)"
            npx ajv validate -s schema/benchmark-result.schema.json -d "/tmp/run-$(basename $file)" --spec=draft2020 -c ajv-formats || exit 1
            echo "✓ $file conforms to schema"
          done

      - name: Verify duplicate benchmark averaging in series
        run: |
          git fetch origin bench-data
          series=$(git show origin/bench-data:data/series/ns_per_op.json)
          echo "=== ns_per_op series ==="
          echo "$series" | python3 -m json.tool

          # Verify that -count=3 run produced averaged values with range
          python3 -c "
          import json, sys
          series = json.loads('''$series''')
          found_range = False
          for key, entry in series['series'].items():
            for pt in entry['points']:
              if pt.get('range') is not None:
                found_range = True
                print(f'  {key}: value={pt[\"value\"]}, range={pt[\"range\"]}')
          if not found_range:
            print('WARNING: No range values found (expected from -count=3 averaging)')
          print('Averaging check complete')
          "

  test-aggregate-max-runs:
    needs: [test-aggregate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count runs before pruning
        run: |
          git fetch origin bench-data
          before=$(git show origin/bench-data:data/index.json | python3 -c "import sys,json; print(len(json.load(sys.stdin)['runs']))")
          echo "Runs before pruning: $before"
          echo "RUNS_BEFORE=$before" >> "$GITHUB_ENV"

      - name: Aggregate with max-runs=2
        uses: ./actions/aggregate
        id: agg
        with:
          max-runs: "2"

      - name: Verify pruning occurred
        run: |
          echo "Run count after pruning: ${{ steps.agg.outputs.run-count }}"
          [[ "${{ steps.agg.outputs.run-count }}" -le 2 ]] || { echo "Expected at most 2 runs"; exit 1; }

          # Verify the data branch reflects pruning
          git fetch origin bench-data
          after=$(git show origin/bench-data:data/index.json | python3 -c "import sys,json; print(len(json.load(sys.stdin)['runs']))")
          echo "Runs on data branch: $after"
          [[ "$after" -le 2 ]] || { echo "Expected at most 2 runs on data branch"; exit 1; }

          # Verify run files were actually removed
          run_files=$(git ls-tree --name-only origin/bench-data data/runs/ | wc -l)
          echo "Run files on branch: $run_files"
          [[ "$run_files" -le 2 ]] || { echo "Expected at most 2 run files"; exit 1; }
          echo "✓ Pruning verified: $RUNS_BEFORE -> $after runs"
