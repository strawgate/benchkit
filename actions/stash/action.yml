name: 'Benchkit Stash'
description: 'Parse benchmark results and commit them to a data branch.'
inputs:
  results:
    description: 'Path or glob pattern to benchmark result file(s).'
    required: true
  format:
    description: 'Input format: go, benchmark-action, native, or auto (default: auto).'
    default: 'auto'
  data-branch:
    description: 'Branch used for benchmark data storage.'
    default: 'bench-data'
  github-token:
    description: 'Token with push access to the repository.'
    default: ${{ github.token }}
  run-id:
    description: 'Custom run identifier. Defaults to GITHUB_RUN_ID-GITHUB_RUN_ATTEMPT.'
    required: false
  monitor:
    description: 'Path to monitor.json produced by the monitor action. When provided, monitor benchmarks and context are merged into the stored result.'
    required: false
  save-data-file:
    description: 'When set to true, upload the parsed BenchmarkResult JSON as a workflow artifact named benchkit-result-{run-id}. Useful for cross-job access (e.g. by the compare action).'
    default: 'false'
    required: false
outputs:
  run-id:
    description: 'The run identifier used for this stash.'
  file-path:
    description: 'Path to the stored JSON file on the data branch.'
  artifact-name:
    description: 'Name of the uploaded workflow artifact (only set when save-data-file is true).'
runs:
  using: 'node24'
  main: 'dist/index.js'
