name: 'Benchkit Stash'
description: 'Parse benchmark results and commit them to a data branch.'
inputs:
  results:
    description: 'Path or glob pattern to benchmark result file(s).'
    required: true
  format:
    description: 'Input format: auto (default), go, rust, hyperfine, pytest-benchmark, benchmark-action, native, or otlp.'
    default: 'auto'
  data-branch:
    description: 'Branch used for benchmark data storage.'
    default: 'bench-data'
  github-token:
    description: 'Token with push access to the data branch.'
    default: ${{ github.token }}
  run-id:
    description: >-
      Custom run identifier (overrides all auto-generation). When omitted,
      defaults to `{GITHUB_RUN_ID}-{GITHUB_RUN_ATTEMPT}--{GITHUB_JOB}[-{matrix-key}]`.
      For most workflows the default is sufficient.
    required: false
  matrix-key:
    description: >-
      Matrix identifier appended to the auto-generated run-id to prevent
      collisions in matrix strategy jobs. GitHub Actions sets the same
      GITHUB_JOB for every matrix variant, so without this input all
      variants overwrite each other. Set to the matrix combination, e.g.
      `${{ matrix.os }}-${{ matrix.node }}`.
    required: false
  monitor:
    description: >-
      Path to the monitor output file (OTLP JSONL or native JSON).
      When provided, monitor benchmarks and context are merged into the
      stored result.
    required: false
  save-data-file:
    description: 'When false, parse and output the result JSON but do not commit it to the data branch.'
    default: 'true'
  summary:
    description: 'When true, write a parsed benchmark summary to GITHUB_STEP_SUMMARY.'
    default: 'true'
outputs:
  run-id:
    description: 'The run identifier used for this stash.'
  file-path:
    description: 'Path to the stored JSON file on the data branch, or to the temporary output file when save-data-file is false.'
runs:
  using: 'node24'
  main: 'dist/index.js'
